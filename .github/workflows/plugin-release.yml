name: Plugin release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.7)"
        required: true
        default: "v0.2.7"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Obsidian desktop targets (native PyInstaller sidecar per OS/CPU)
          - runs-on: macos-14
            release_platform: darwin-arm64
            build: bash scripts/build-plugin-release.sh
          - runs-on: macos-13
            release_platform: darwin-x64
            build: bash scripts/build-plugin-release.sh
          - runs-on: ubuntu-latest
            release_platform: linux-x64
            build: bash scripts/build-plugin-release.sh
          - runs-on: ubuntu-24.04-arm
            release_platform: linux-arm64
            build: bash scripts/build-plugin-release.sh
          - runs-on: windows-latest
            release_platform: windows-x64
            build: powershell -ExecutionPolicy Bypass -File scripts/build-plugin-release.ps1
          - runs-on: windows-11-arm
            release_platform: windows-arm64
            build: powershell -ExecutionPolicy Bypass -File scripts/build-plugin-release.ps1
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 120
    env:
      RELEASE_PLATFORM: ${{ matrix.release_platform }}
      SKIP_PLUGIN_UI: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install Node deps and build plugin UI
        run: |
          cd obsidian-plugin
          npm install
          npm run build

      - name: Build release zip (${{ matrix.release_platform }})
        run: ${{ matrix.build }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: dist/release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
