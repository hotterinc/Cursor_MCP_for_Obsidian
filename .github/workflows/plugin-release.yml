name: Plugin release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.7)"
        required: true
        default: "v0.2.7"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-14
            release_platform: darwin-arm64
          - runs-on: macos-15-intel
            release_platform: darwin-x64
          - runs-on: ubuntu-latest
            release_platform: linux-x64
          - runs-on: ubuntu-24.04-arm
            release_platform: linux-arm64
          - runs-on: windows-latest
            release_platform: windows-x64
          - runs-on: windows-11-arm
            release_platform: windows-arm64
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 120
    env:
      RELEASE_PLATFORM: ${{ matrix.release_platform }}
      SKIP_PLUGIN_UI: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"
          enable-cache: auto

      - name: Install Node deps and build plugin UI
        run: |
          cd obsidian-plugin
          npm install
          npm run build

      - name: Build release zip (${{ matrix.release_platform }})
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/build-plugin-release.sh

      - name: Build release zip (${{ matrix.release_platform }})
        if: runner.os == 'Windows'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/build-plugin-release.ps1

      - name: Show release artifact sizes
        shell: bash
        run: |
          shopt -s nullglob
          ls -lh dist/release/*.zip dist/release/*.zip.* 2>/dev/null || true
          du -h dist/release/obsidian-context-mcp/bin/* 2>/dev/null || true

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          files: |
            dist/release/*.zip
            dist/release/*.zip.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
