name: Plugin release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.7)"
        required: true
        default: "v0.2.7"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            asset: darwin-arm64
            zip_script: bash scripts/build-plugin-release.sh
          - os: windows-latest
            asset: windows-x64
            zip_script: powershell -ExecutionPolicy Bypass -File scripts/build-plugin-release.ps1
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install Node deps and build plugin UI
        run: |
          cd obsidian-plugin
          npm install
          npm run build

      - name: Build release zip
        run: ${{ matrix.zip_script }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: dist/release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
